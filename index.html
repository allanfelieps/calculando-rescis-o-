<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Rescisão</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .campo {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }

    .campo label {
      font-weight: bold;
      margin-bottom: 5px;
      color: #333;
    }

    .campo input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2e7d32;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #1b5e20;
    }

    .resultado {
      margin-top: 20px;
      padding: 15px;
      background: #e8f5e9;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Calculadora de Rescisão</h1>

  <div class="campo">
    <label for="admissao">Data de admissão</label>
    <input type="date" id="admissao">
  </div>

  <div class="campo">
    <label for="demissao">Data de demissão</label>
    <input type="date" id="demissao">
  </div>

  <div class="campo">
    <label for="salario">Salário (R$)</label>
    <input type="number" id="salario" placeholder="Ex: 2000">
  </div>

  <button onclick="calcular()">Calcular</button>

  <div class="resultado" id="resultado"></div>
</div>

<script>
function calcular() {
  const admissao = new Date(document.getElementById("admissao").value);
  const demissao = new Date(document.getElementById("demissao").value);
  const salario = parseFloat(document.getElementById("salario").value);

  if (!admissao || !demissao || !salario) {
    alert("Preencha todos os campos!");
    return;
  }

  const tempo = (demissao - admissao) / (1000 * 60 * 60 * 24 * 30);
  const meses = Math.floor(tempo);

  const saldoSalario = salario;
  const fgts = salario * 0.08 * meses;
  const multa = fgts * 0.4;

  const total = saldoSalario + fgts + multa;

  const resultado = document.getElementById("resultado");
  resultado.style.display = "block";

  resultado.innerHTML = `
    <strong>Resultado:</strong><br><br>
    Tempo trabalhado: ${meses} meses<br>
    Saldo de salário: R$ ${saldoSalario.toFixed(2)}<br>
    FGTS: R$ ${fgts.toFixed(2)}<br>
    Multa FGTS (40%): R$ ${multa.toFixed(2)}<br><br>
    <strong>Total: R$ ${total.toFixed(2)}</strong>
  `;
}
</script>

</body>
</html>
