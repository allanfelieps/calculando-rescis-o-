<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Rescisão</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #2e7d32, #66bb6a);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #2e7d32;
    }

    .campo {
      display: flex;
      flex-direction: column;
      margin-bottom: 15px;
    }

    .campo input {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .campo input:focus {
      border-color: #2e7d32;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      background: #1b5e20;
    }

    .resultado {
      margin-top: 20px;
      padding: 15px;
      background: #f1f8e9;
      border-radius: 10px;
      display: none;
      font-size: 14px;
    }

    .resultado strong {
      color: #2e7d32;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Calculadora de Rescisão</h1>

  <div class="campo">
    <input type="date" id="admissao">
  </div>

  <div class="campo">
    <input type="date" id="demissao">
  </div>

  <div class="campo">
    <input type="number" id="salario" placeholder="Salário (R$)">
  </div>

  <button onclick="calcular()">Calcular</button>

  <div class="resultado" id="resultado"></div>
</div>

<script>
function calcular() {
  const admissao = new Date(document.getElementById("admissao").value);
  const demissao = new Date(document.getElementById("demissao").value);
  const salario = parseFloat(document.getElementById("salario").value);

  if (!document.getElementById("admissao").value || 
      !document.getElementById("demissao").value || 
      !salario) {
    alert("Preencha todos os campos!");
    return;
  }

  const tempo = (demissao - admissao) / (1000 * 60 * 60 * 24 * 30);
  const meses = Math.floor(tempo);

  const saldoSalario = salario;
  const fgts = salario * 0.08 * meses;
  const multa = fgts * 0.4;

  const total = saldoSalario + fgts + multa;

  const resultado = document.getElementById("resultado");
  resultado.style.display = "block";

  resultado.innerHTML = `
    <strong>Resultado:</strong><br><br>
    Tempo trabalhado: ${meses} meses<br>
    Saldo de salário: R$ ${saldoSalario.toFixed(2)}<br>
    FGTS: R$ ${fgts.toFixed(2)}<br>
    Multa FGTS: R$ ${multa.toFixed(2)}<br><br>
    <strong>Total: R$ ${total.toFixed(2)}</strong>
  `;
}
</script>

</body>
</html>
