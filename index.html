<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rescisão Fácil - Calculadora de Rescisão Trabalhista</title>

<meta name="description" content="Calcule sua rescisão trabalhista online de forma simples e rápida com a Rescisão Fácil. Simulador gratuito.">
<meta name="keywords" content="rescisão trabalhista, cálculo de rescisão, simulador de rescisão">

<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  background: #f4f7fb;
}

.header {
  background: #2d6cdf;
  color: white;
  text-align: center;
  padding: 30px 20px;
}

.header h1 {
  margin: 0;
  font-size: 32px;
}

.header p {
  margin-top: 10px;
  font-size: 16px;
}

.container {
  max-width: 600px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

label {
  display: block;
  margin-top: 15px;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  background: #2d6cdf;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #1c4fb5;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: #eaf2ff;
  border-radius: 5px;
  font-weight: bold;
}

.footer {
  text-align: center;
  margin-top: 30px;
  font-size: 12px;
  color: #777;
}
</style>
</head>

<body>

<div class="header">
  <h1>Rescisão Fácil</h1>
  <p>Saiba agora como calcular sua rescisão trabalhista de forma simples e rápida</p>
</div>

<div class="container">

  <label>Salário (R$)</label>
  <input type="number" id="salario">

  <label>Tempo de empresa (meses)</label>
  <input type="number" id="tempo">

  <label>Motivo da demissão</label>
  <select id="motivo">
    <option value="sem">Sem justa causa</option>
    <option value="com">Com justa causa</option>
  </select>

  <button onclick="calcular()">Calcular Rescisão</button>

  <div class="result" id="resultado"></div>

</div>

<div class="footer">
  © 2026 Rescisão Fácil - Simulador Informativo
</div>

<script>
function calcular() {
  let salario = parseFloat(document.getElementById("salario").value);
  let tempo = parseFloat(document.getElementById("tempo").value);
  let motivo = document.getElementById("motivo").value;

  if (!salario || !tempo) {
    document.getElementById("resultado").innerText = "Preencha todos os campos.";
    return;
  }

  let valor = 0;

  if (motivo === "sem") {
    valor = salario + (salario * 0.4) + (tempo * (salario / 12));
  } else {
    valor = salario;
  }

  document.getElementById("resultado").innerText =
    "Valor estimado da rescisão: R$ " + valor.toFixed(2);
}
</script>

</body>
</html>
